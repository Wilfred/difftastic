type User {
  id: ID!
  name: String!
  email: String
  role: Role
  posts: [Post!]!
}

enum Role {
  ADMIN
  USER
  GUEST
}

input CreateUserInput {
  name: String!
  email: String!
  role: Role = USER
}

union SearchResult = User | Post

interface Node {
  id: ID!
}

query GetUser($id: ID!) {
  user(id: $id) {
    id
    name
    email
    ...UserFields
  }
}

fragment UserFields on User {
  role
  posts {
    title
  }
}

mutation CreateUser($input: CreateUserInput!) {
  createUser(input: $input) {
    id
    name
  }
}

directive @cacheControl(maxAge: Int) on FIELD_DEFINITION

scalar DateTime
